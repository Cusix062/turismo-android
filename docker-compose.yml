services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turismo-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/lugares"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - turismo-net

networks:
  turismo-net:
    driver: bridge
