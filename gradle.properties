android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# RAM reducida para servidor con 3.5 GB total
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false

# AGP 8.7.x avisaba: compileSdk 36 no estaba en la matriz de pruebas; es seguro suprimir o subir AGP más adelante
android.suppressUnsupportedCompileSdk=36
